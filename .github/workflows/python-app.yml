# This workflow scrapes VIA Rail live data and commits it to the repository.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  schedule:
    # Run at :00 and :20 and :40 during the 2–3 AM UTC window (6 runs/day).
    - cron: '0,20,40 2-4 * * *' #Ref https://crontab.guru/examples.html

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # Cache pip dependencies to skip re-downloading on every run
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    - name: Execute py script
      run: python save_via_data.py
    - name: Commit and push data
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add raw_data/
        git diff --staged --quiet || git commit -m "Update VIA Rail data - $(date -u +'%Y-%m-%d %H:%M UTC')"
        git push
