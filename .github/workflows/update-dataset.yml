# This workflow runs the daily incremental dataset update after all scraping iterations are complete.
# The scraper (python-app.yml) runs at :00, :20, :40 during 2–4 AM UTC (last run at 04:40 UTC).
# This workflow runs at 05:00 UTC to ensure all scrapes for the day have been collected.

name: Daily Dataset Update

on:
  schedule:
    # Run at 05:00 UTC daily, after all scraping iterations finish by ~04:40 UTC.
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # Cache pip dependencies to skip re-downloading on every run
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run incremental dataset update
      run: python update_dataset.py
    - name: Commit and push updated dataset
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add clean_data/
        git diff --staged --quiet || git commit -m "Update clean dataset - $(date -u +'%Y-%m-%d %H:%M UTC')"
        git push
